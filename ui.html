<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #161616;
      --surface: #1e1e1e;
      --surface-hover: #272727;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #6b6b6b;
      --accent: #ff6b35;
      --accent-hover: #ff8555;
      --accent-subtle: rgba(255, 107, 53, 0.08);
      --success: #4ade80;
      --error: #f87171;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      padding: 12px 14px;
      line-height: 1.3;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .selection-badge {
      font-size: 10px;
      color: var(--text-muted);
      padding: 3px 7px;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.15s ease;
    }

    .selection-badge.active {
      color: var(--accent);
      background: var(--accent-subtle);
      border-color: rgba(255, 107, 53, 0.2);
    }

    /* Section */
    .section {
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* Direction Grid — 4 in a row */
    .direction-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: var(--surface);
      border-radius: 8px;
      padding: 3px;
      border: 1px solid var(--border);
    }

    .direction-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      padding: 8px 4px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .direction-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .direction-btn.selected {
      background: var(--accent-subtle);
      border-color: rgba(255, 107, 53, 0.25);
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 107, 53, 0.1);
    }

    .direction-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .direction-btn.selected svg,
    .direction-btn:hover svg {
      opacity: 1;
    }

    /* Options — compact 2x2 */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .option {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .option label {
      font-size: 10px;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      font-weight: 500;
    }

    .option input {
      padding: 6px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      font-family: inherit;
      outline: none;
      transition: all 0.15s ease;
      width: 100%;
    }

    .option input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-subtle);
    }

    .option input::placeholder {
      color: #444;
    }

    /* Spacer pushes actions to bottom */
    .spacer { flex: 1; min-height: 10px; }

    /* Actions */
    .actions {
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 2px 8px rgba(255, 107, 53, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 14px;
      right: 14px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 500;
      text-align: center;
      transform: translateY(60px);
      opacity: 0;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: rgba(74, 222, 128, 0.12);
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .toast.error {
      background: rgba(248, 113, 113, 0.12);
      color: var(--error);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Numero</span>
    <span class="selection-badge" id="selectionBadge">0 selected</span>
  </div>

  <div class="section">
    <div class="section-label">Direction</div>
    <div class="direction-grid">
      <button class="direction-btn selected" data-direction="left-right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        L → R
      </button>
      <button class="direction-btn" data-direction="right-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        R → L
      </button>
      <button class="direction-btn" data-direction="top-bottom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
        T → B
      </button>
      <button class="direction-btn" data-direction="bottom-top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19V5M19 12l-7-7-7 7"/>
        </svg>
        B → T
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Options</div>
    <div class="options">
      <div class="option">
        <label>Start at</label>
        <input type="number" id="startAt" value="1" min="0">
      </div>
      <div class="option">
        <label>Padding</label>
        <input type="number" id="padding" value="1" min="1" max="5">
      </div>
      <div class="option">
        <label>Prefix</label>
        <input type="text" id="prefix" placeholder="step-">
      </div>
      <div class="option">
        <label>Suffix</label>
        <input type="text" id="suffix" placeholder="_final">
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <div class="actions">
    <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
    <button class="btn btn-primary" id="applyBtn">Apply</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let selectedDirection = 'left-right';
    let selectionCount = 0;

    // Direction buttons
    document.querySelectorAll('.direction-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedDirection = btn.dataset.direction;
      });
    });

    // Apply
    document.getElementById('applyBtn').addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: {
          type: 'number-layers',
          direction: selectedDirection,
          startAt: parseInt(document.getElementById('startAt').value) || 1,
          padding: parseInt(document.getElementById('padding').value) || 1,
          prefix: document.getElementById('prefix').value,
          suffix: document.getElementById('suffix').value
        }
      }, '*');
    });

    // Cancel
    document.getElementById('cancelBtn').addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    // Messages from plugin
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'selection') {
        selectionCount = msg.count;
        const badge = document.getElementById('selectionBadge');
        badge.textContent = `${msg.count} selected`;
        badge.classList.toggle('active', msg.count > 0);
        document.getElementById('applyBtn').disabled = msg.count === 0;
      }

      if (msg.type === 'success' || msg.type === 'error') {
        showToast(msg.message, msg.type);
      }
    };

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
